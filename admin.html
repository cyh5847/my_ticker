<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>관리자 - 관심종목 시세판</title>
<style>
  :root{
    --bg: #0B0E11;
    --card: #13171C;
    --border: #1F252D;
    --text: #E8EAED;
    --text-sub: #8B92A0;
    --text-dim: #5B6270;
    --up: #16C784;
    --down: #EA3943;
    --down-bg: rgba(234,57,67,0.12);
    --accent: #F0B90B;
    --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    border-bottom:1px solid var(--border);
    padding:16px;
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between;
    max-width:720px; margin:0 auto;
  }
  .logo{font-size:17px; font-weight:600;}
  .logo .badge{
    font-size:11px; background:var(--accent); color:#1a1300;
    padding:2px 8px; border-radius:6px; margin-left:8px; font-weight:700;
  }

  main{max-width:720px; margin:0 auto; padding:24px 16px;}

  /* 로그인 영역 */
  .login-box{
    max-width:340px; margin:80px auto; text-align:center;
  }
  .login-box p{color:var(--text-sub); font-size:13px; margin-bottom:18px;}
  .login-box input{
    width:100%;
    background:var(--card); border:1px solid var(--border); color:var(--text);
    font-size:15px; padding:12px 14px; border-radius:10px; outline:none;
    text-align:center; letter-spacing:2px;
  }
  .login-box input:focus{border-color:var(--accent);}
  .login-box button{
    width:100%; margin-top:10px;
    background:var(--accent); color:#1a1300; border:none;
    font-size:14px; font-weight:600; padding:12px; border-radius:10px; cursor:pointer;
  }
  .login-error{color:var(--down); font-size:12px; margin-top:10px; min-height:16px;}

  /* 관리 영역 */
  .panel{display:none;}
  .search-wrap{position:relative; margin-bottom:18px;}
  .search-wrap input{
    width:100%; background:var(--card); border:1px solid var(--border); color:var(--text);
    font-size:15px; padding:12px 14px; border-radius:10px; outline:none; box-sizing:border-box;
  }
  .search-wrap input:focus{border-color:var(--accent);}
  .search-hint{font-size:12px; color:var(--text-dim); margin-top:6px;}

  .suggestions{
    position:absolute; top:calc(100% + 6px); left:0; right:0;
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    max-height:280px; overflow-y:auto; z-index:20;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    display:none;
  }
  .suggestions.show{display:block;}
  .suggestion-item{
    padding:11px 14px; cursor:pointer; font-size:14px;
    border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .suggestion-item:last-child{border-bottom:none;}
  .suggestion-item:hover{background:var(--border);}
  .suggestion-item .s-label{font-weight:500;}
  .suggestion-item .s-market{font-size:10px; color:var(--text-dim); background:var(--border); padding:2px 6px; border-radius:5px;}
  .suggestion-empty{padding:14px; font-size:13px; color:var(--text-dim); text-align:center;}

  .save-status{font-size:12px; color:var(--text-dim); margin-bottom:14px; min-height:16px;}
  .save-status.error{color:var(--down);}
  .save-status.ok{color:var(--up);}

  .list{display:flex; flex-direction:column; gap:8px;}
  .row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px;
  }
  .row .info{display:flex; flex-direction:column;}
  .row .ticker-label{font-weight:600; font-size:14px;}
  .row .ticker-sub{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:2px;}
  .row .remove{
    background:none; border:none; color:var(--text-dim); font-size:13px; cursor:pointer;
    padding:6px 10px; border-radius:6px;
  }
  .row .remove:hover{color:var(--down); background:var(--down-bg);}

  .empty{color:var(--text-dim); font-size:13px; text-align:center; padding:30px 0;}

  footer{
    max-width:720px; margin:30px auto 0; padding:0 16px;
    text-align:center; font-size:11px;
  }
  footer a{color:var(--text-dim); text-decoration:underline;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">관심종목 시세판 <span class="badge">관리자</span></div>
  </div>
</header>

<main>
  <div class="login-box" id="loginBox">
    <p>관리자 비밀번호를 입력하세요</p>
    <input type="password" id="passwordInput" placeholder="••••••" autocomplete="off">
    <button id="loginBtn">입장</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <div class="panel" id="panel">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="종목명이나 코드를 입력하세요 (예: 삼성전자, AAPL, 비트코인)" autocomplete="off">
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div class="search-hint">한국 주식은 시가총액 상위 종목, 미국 주식과 코인은 실시간 검색, 국채는 "국채"로 검색하세요.</div>
    <div class="save-status" id="saveStatus"></div>
    <div class="list" id="list"></div>
  </div>
</main>

<footer>
  <a href="/">시세판으로 돌아가기</a>
</footer>

<script>
let password = '';
let watchlist = [];
let searchTimer = null;

const loginBox = document.getElementById('loginBox');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const panel = document.getElementById('panel');
const list = document.getElementById('list');
const saveStatus = document.getElementById('saveStatus');
const searchInput = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');

function marketLabel(m){
  return {us:'미국', kr:'한국', crypto:'코인', bond:'국채'}[m] || m;
}

function renderList(){
  list.innerHTML = '';
  if(watchlist.length === 0){
    list.innerHTML = '<div class="empty">등록된 종목이 없어요. 위에서 검색해서 추가해보세요.</div>';
    return;
  }
  watchlist.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'row';
    const label = item.label || item.ticker;
    row.innerHTML = `
      <div class="info">
        <span class="ticker-label">${label}</span>
        <span class="ticker-sub">${item.ticker} · ${marketLabel(item.market)}</span>
      </div>
      <button class="remove" data-idx="${idx}">삭제</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx, 10);
      watchlist.splice(idx, 1);
      renderList();
      saveList();
    });
  });
}

async function saveList(){
  saveStatus.textContent = '저장 중...';
  saveStatus.className = 'save-status';
  try{
    const res = await fetch('/api/watchlist', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password, list: watchlist })
    });
    const data = await res.json();
    if(!res.ok || data.error) throw new Error(data.error || '저장 실패');
    watchlist = data.list || watchlist;
    saveStatus.textContent = '저장됐어요. 시세판에 바로 반영됩니다.';
    saveStatus.className = 'save-status ok';
  }catch(err){
    saveStatus.textContent = '저장 실패: ' + err.message;
    saveStatus.className = 'save-status error';
  }
}

function addItem(suggestion){
  const exists = watchlist.some(w => w.market === suggestion.market && w.ticker === suggestion.ticker);
  if(exists){
    searchInput.value = '';
    hideSuggestions();
    return;
  }
  watchlist.push({ market: suggestion.market, ticker: suggestion.ticker, label: suggestion.label });
  searchInput.value = '';
  hideSuggestions();
  renderList();
  saveList();
}

function hideSuggestions(){
  suggestionsEl.classList.remove('show');
  suggestionsEl.innerHTML = '';
}

function showSuggestions(results){
  if(results.length === 0){
    suggestionsEl.innerHTML = '<div class="suggestion-empty">검색 결과가 없어요</div>';
  } else {
    suggestionsEl.innerHTML = results.map((r, i) => `
      <div class="suggestion-item" data-idx="${i}">
        <span class="s-label">${r.label}</span>
        <span class="s-market">${marketLabel(r.market)}</span>
      </div>
    `).join('');
    suggestionsEl.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx, 10);
        addItem(results[idx]);
      });
    });
  }
  suggestionsEl.classList.add('show');
}

async function doSearch(q){
  if(!q || q.trim().length === 0){
    hideSuggestions();
    return;
  }
  try{
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    showSuggestions(data.results || []);
  }catch(err){
    showSuggestions([]);
  }
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value;
  searchTimer = setTimeout(() => doSearch(q), 300);
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')){
    hideSuggestions();
  }
});

async function loadList(){
  const res = await fetch('/api/watchlist');
  const data = await res.json();
  watchlist = data.list || [];
  renderList();
}

async function tryLogin(){
  const pw = passwordInput.value;
  if(!pw) return;
  loginError.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = '확인 중...';
  try{
    const verifyRes = await fetch('/api/watchlist', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: pw, action: 'verify' })
    });
    const verifyData = await verifyRes.json();
    if(!verifyRes.ok || verifyData.error){
      loginError.textContent = verifyData.error || '비밀번호가 올바르지 않습니다.';
      loginBtn.disabled = false;
      loginBtn.textContent = '입장';
      return;
    }
    password = pw;
    watchlist = Array.isArray(verifyData.list) ? verifyData.list : [];
    loginBox.style.display = 'none';
    panel.style.display = 'block';
    renderList();
  }catch(err){
    loginError.textContent = '로그인 중 오류가 발생했습니다.';
    loginBtn.disabled = false;
    loginBtn.textContent = '입장';
  }
}

loginBtn.addEventListener('click', tryLogin);
passwordInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') tryLogin();
});
</script>

</body>
</html>
