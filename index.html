<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>내 관심종목 시세판</title>
<style>
  :root{
    --bg: #0B0E11;
    --card: #13171C;
    --card-hover: #171C23;
    --border: #1F252D;
    --text: #E8EAED;
    --text-sub: #8B92A0;
    --text-dim: #5B6270;
    --up: #16C784;
    --up-bg: rgba(22,199,132,0.12);
    --down: #EA3943;
    --down-bg: rgba(234,57,67,0.12);
    --accent: #F0B90B;
    --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:rgba(11,14,17,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    padding:16px 16px 12px;
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between;
    max-width:920px; margin:0 auto 12px;
  }
  .logo{
    font-size:17px; font-weight:600; letter-spacing:-0.2px;
    display:flex; align-items:center; gap:8px;
  }
  .logo .dot{width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block;}
  .last-update{font-size:12px; color:var(--text-dim); font-family:var(--mono);}

  .search-row{
    max-width:920px; margin:0 auto;
    display:flex; gap:8px;
  }
  .search-row input{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    font-size:15px;
    padding:11px 14px;
    border-radius:10px;
    outline:none;
    font-family:var(--mono);
  }
  .search-row input::placeholder{color:var(--text-dim); font-family:-apple-system, sans-serif;}
  .search-row input:focus{border-color:var(--accent);}
  .search-row select{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text-sub);
    font-size:13px;
    padding:11px 10px;
    border-radius:10px;
    outline:none;
  }
  .add-btn{
    background:var(--accent);
    color:#1a1300;
    border:none;
    font-size:14px;
    font-weight:600;
    padding:11px 18px;
    border-radius:10px;
    cursor:pointer;
    white-space:nowrap;
  }
  .add-btn:active{transform:scale(0.97);}

  .hint-row{
    max-width:920px; margin:8px auto 0;
    font-size:12px; color:var(--text-dim);
    display:flex; gap:14px; flex-wrap:wrap;
  }
  .hint-row span{cursor:pointer; text-decoration:underline; text-decoration-color:var(--border);}

  main{max-width:920px; margin:0 auto; padding:18px 16px;}

  .empty-state{
    text-align:center;
    padding:80px 20px;
    color:var(--text-dim);
  }
  .empty-state .big{font-size:15px; color:var(--text-sub); margin-bottom:6px;}
  .empty-state .small{font-size:13px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:10px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 16px;
    position:relative;
    transition:border-color 0.2s;
  }
  .card.flash-up{animation:flashUp 0.6s ease;}
  .card.flash-down{animation:flashDown 0.6s ease;}
  @keyframes flashUp{
    0%{background:var(--up-bg); border-color:var(--up);}
    100%{background:var(--card); border-color:var(--border);}
  }
  @keyframes flashDown{
    0%{background:var(--down-bg); border-color:var(--down);}
    100%{background:var(--card); border-color:var(--border);}
  }

  .card-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:10px;
  }
  .ticker-info{display:flex; flex-direction:column; gap:2px;}
  .ticker-symbol{font-size:13px; font-weight:600; color:var(--text-sub); letter-spacing:0.3px; font-family:var(--mono);}
  .ticker-name{font-size:12px; color:var(--text-dim);}
  .market-badge{
    font-size:10px; padding:2px 7px; border-radius:5px;
    background:var(--border); color:var(--text-dim);
    font-weight:600; letter-spacing:0.3px;
  }
  .remove-btn{
    background:none; border:none; color:var(--text-dim);
    font-size:18px; cursor:pointer; padding:0 4px;
    line-height:1;
  }
  .remove-btn:hover{color:var(--down);}

  .price-row{
    display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
  }
  .price{
    font-family:var(--mono);
    font-size:26px; font-weight:600;
    letter-spacing:-0.5px;
  }
  .change{
    font-family:var(--mono);
    font-size:14px; font-weight:600;
    padding:3px 8px; border-radius:6px;
  }
  .change.up{color:var(--up); background:var(--up-bg);}
  .change.down{color:var(--down); background:var(--down-bg);}
  .change.flat{color:var(--text-dim); background:var(--border);}

  .card-foot{
    margin-top:8px; font-size:11px; color:var(--text-dim);
    font-family:var(--mono);
  }
  .status-loading{color:var(--text-dim); font-size:13px;}
  .status-error{color:var(--down); font-size:12px;}

  footer{
    max-width:920px; margin:30px auto 0; padding:0 16px;
    text-align:center; font-size:11px; color:var(--text-dim);
  }

  @media (max-width:480px){
    .price{font-size:23px;}
    .header-top{margin-bottom:10px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo"><span class="dot"></span>내 관심종목</div>
    <div class="last-update" id="lastUpdate">대기중</div>
  </div>
  <div class="search-row">
    <select id="marketSelect">
      <option value="us">미국</option>
      <option value="kr">한국</option>
      <option value="crypto">코인</option>
    </select>
    <input type="text" id="tickerInput" placeholder="예: AAPL / 005930 / BTC" autocomplete="off">
    <button class="add-btn" id="addBtn">추가</button>
  </div>
  <div class="hint-row">
    <span data-m="us" data-t="AAPL">AAPL</span>
    <span data-m="us" data-t="TSLA">TSLA</span>
    <span data-m="us" data-t="NVDA">NVDA</span>
    <span data-m="kr" data-t="005930">삼성전자</span>
    <span data-m="crypto" data-t="BTC">BTC</span>
    <span data-m="crypto" data-t="ETH">ETH</span>
  </div>
</header>

<main>
  <div id="emptyState" class="empty-state">
    <div class="big">아직 등록된 종목이 없어요</div>
    <div class="small">위 검색창에 티커를 입력하고 추가해보세요</div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  시세는 실시간이 아닌 지연 데이터일 수 있습니다 · 투자 참고용이며 투자 판단의 근거로 사용하지 마세요
</footer>

<script>
const STORAGE_KEY = 'watchlist_v1';
let watchlist = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let priceCache = {};

const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const tickerInput = document.getElementById('tickerInput');
const marketSelect = document.getElementById('marketSelect');
const addBtn = document.getElementById('addBtn');
const lastUpdateEl = document.getElementById('lastUpdate');

function saveList(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(watchlist));
}

function keyOf(item){
  return item.market + ':' + item.ticker;
}

function addTicker(market, rawTicker){
  const ticker = rawTicker.trim().toUpperCase();
  if(!ticker) return;
  const exists = watchlist.some(w => w.market===market && w.ticker===ticker);
  if(exists) return;
  watchlist.push({market, ticker});
  saveList();
  render();
  fetchOne(market, ticker);
}

function removeTicker(market, ticker){
  watchlist = watchlist.filter(w => !(w.market===market && w.ticker===ticker));
  saveList();
  render();
}

function marketLabel(m){
  return {us:'미국', kr:'한국', crypto:'코인'}[m] || m;
}

function formatPrice(market, value){
  if(value == null || isNaN(value)) return '-';
  if(market === 'crypto'){
    if(value >= 1000) return value.toLocaleString('ko-KR', {maximumFractionDigits:0});
    if(value >= 1) return value.toLocaleString('ko-KR', {maximumFractionDigits:2});
    return value.toFixed(6);
  }
  if(market === 'kr'){
    return Math.round(value).toLocaleString('ko-KR');
  }
  return value.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function currencySymbol(market){
  if(market === 'us') return '$';
  if(market === 'kr') return '₩';
  return '$';
}

function render(){
  grid.innerHTML = '';
  emptyState.style.display = watchlist.length === 0 ? 'block' : 'none';

  watchlist.forEach(item => {
    const k = keyOf(item);
    const cached = priceCache[k];

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + k.replace(/[^a-zA-Z0-9]/g,'_');

    const top = document.createElement('div');
    top.className = 'card-top';

    const info = document.createElement('div');
    info.className = 'ticker-info';
    const sym = document.createElement('div');
    sym.className = 'ticker-symbol';
    sym.textContent = item.ticker;
    const name = document.createElement('div');
    name.className = 'ticker-name';
    name.textContent = marketLabel(item.market);
    info.appendChild(sym);
    info.appendChild(name);

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.alignItems = 'center';
    right.style.gap = '8px';
    const badge = document.createElement('div');
    badge.className = 'market-badge';
    badge.textContent = marketLabel(item.market);
    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.innerHTML = '&times;';
    removeBtn.onclick = () => removeTicker(item.market, item.ticker);
    right.appendChild(badge);
    right.appendChild(removeBtn);

    top.appendChild(info);
    top.appendChild(right);
    card.appendChild(top);

    const body = document.createElement('div');
    if(!cached){
      body.innerHTML = '<div class="status-loading">불러오는 중...</div>';
    } else if(cached.error){
      body.innerHTML = '<div class="status-error">시세를 불러오지 못했어요 (' + cached.error + ')</div>';
    } else {
      const priceRow = document.createElement('div');
      priceRow.className = 'price-row';
      const priceEl = document.createElement('span');
      priceEl.className = 'price';
      priceEl.textContent = currencySymbol(item.market) + formatPrice(item.market, cached.price);

      const changeEl = document.createElement('span');
      const pct = cached.changePct;
      let dir = 'flat';
      if(pct > 0) dir = 'up'; else if(pct < 0) dir = 'down';
      changeEl.className = 'change ' + dir;
      const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '–';
      const pctText = (pct == null || isNaN(pct)) ? '-' : (Math.abs(pct).toFixed(2) + '%');
      changeEl.textContent = arrow + ' ' + pctText;

      priceRow.appendChild(priceEl);
      priceRow.appendChild(changeEl);
      body.appendChild(priceRow);

      const foot = document.createElement('div');
      foot.className = 'card-foot';
      foot.textContent = cached.updatedAt ? ('업데이트 ' + cached.updatedAt) : '';
      body.appendChild(foot);
    }
    card.appendChild(body);
    grid.appendChild(card);
  });
}

function flashCard(k, dir){
  const el = document.getElementById('card-' + k.replace(/[^a-zA-Z0-9]/g,'_'));
  if(!el) return;
  el.classList.remove('flash-up','flash-down');
  void el.offsetWidth;
  if(dir === 'up') el.classList.add('flash-up');
  if(dir === 'down') el.classList.add('flash-down');
}

async function fetchCrypto(ticker){
  const idMap = {
    BTC:'bitcoin', ETH:'ethereum', SOL:'solana', XRP:'ripple', DOGE:'dogecoin',
    ADA:'cardano', AVAX:'avalanche-2', DOT:'polkadot', LINK:'chainlink', LTC:'litecoin',
    MATIC:'matic-network', BNB:'binancecoin', TRX:'tron', SHIB:'shiba-inu', TON:'the-open-network'
  };
  const id = idMap[ticker] || ticker.toLowerCase();
  const url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + id + '&vs_currencies=usd&include_24hr_change=true';
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  const entry = data[id];
  if(!entry) throw new Error('종목 없음');
  return {
    price: entry.usd,
    changePct: entry.usd_24h_change
  };
}

async function fetchStooq(symbol){
  const url = 'https://stooq.com/q/l/?s=' + symbol + '&f=sd2t2ohlcv&h&e=csv';
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const lines = text.trim().split('\n');
  if(lines.length < 2) throw new Error('데이터 없음');
  const cols = lines[1].split(',');
  const close = parseFloat(cols[6]);
  const open = parseFloat(cols[3]);
  if(isNaN(close) || close <= 0) throw new Error('종목 없음');
  const changePct = open > 0 ? ((close - open) / open) * 100 : 0;
  return { price: close, changePct };
}

async function fetchOne(market, ticker){
  const k = market + ':' + ticker;
  try{
    let result;
    if(market === 'crypto'){
      result = await fetchCrypto(ticker);
    } else if(market === 'us'){
      result = await fetchStooq(ticker.toLowerCase() + '.us');
    } else if(market === 'kr'){
      let code = ticker.replace(/[^0-9]/g,'');
      if(code.length === 0) code = ticker;
      result = await fetchStooq(code + '.ks').catch(() => fetchStooq(code + '.kq'));
    }
    const prevPrice = priceCache[k] && !priceCache[k].error ? priceCache[k].price : null;
    priceCache[k] = {
      price: result.price,
      changePct: result.changePct,
      updatedAt: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
    };
    render();
    if(prevPrice != null){
      if(result.price > prevPrice) flashCard(k, 'up');
      else if(result.price < prevPrice) flashCard(k, 'down');
    }
  }catch(err){
    priceCache[k] = { error: err.message || '오류' };
    render();
  }
}

async function fetchAll(){
  if(watchlist.length === 0) return;
  await Promise.all(watchlist.map(w => fetchOne(w.market, w.ticker)));
  lastUpdateEl.textContent = '업데이트 ' + new Date().toLocaleTimeString('ko-KR');
}

addBtn.onclick = () => {
  addTicker(marketSelect.value, tickerInput.value);
  tickerInput.value = '';
  tickerInput.focus();
};
tickerInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    addTicker(marketSelect.value, tickerInput.value);
    tickerInput.value = '';
  }
});
document.querySelectorAll('.hint-row span').forEach(span => {
  span.addEventListener('click', () => {
    addTicker(span.dataset.m, span.dataset.t);
  });
});

render();
fetchAll();
setInterval(fetchAll, 15000);
</script>

</body>
</html>
